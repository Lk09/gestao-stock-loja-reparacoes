<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Loja</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>

<body>
    <nav style="background: #343a40; padding: 15px; margin-bottom: 20px; display: flex; gap: 15px; align-items: center; border-radius: 0 0 8px 8px;">
    <a href="index.html" style="text-decoration: none; color: white; padding: 8px 15px; background: #007bff; border-radius: 5px; font-weight: bold;">📦 Stock</a>
    <a href="clientes.html" style="text-decoration: none; color: white; padding: 8px 15px; background: #28a745; border-radius: 5px; font-weight: bold;">👥 Clientes</a>
    <a href="reparacoes.html" style="text-decoration: none; color: white; padding: 8px 15px; background: #ff9800; border-radius: 5px; font-weight: bold;">🛠️ Reparações</a>
</nav>

    <h1>📦 Stock de Peças</h1>
    <button onclick="carregarStock()" style="padding: 10px; cursor: pointer;">🔄 Atualizar Tabela</button>

    <table>
       <thead>
            <tr>
                <th>ID</th>
                <th>Nome da Peça</th>
                <th>Quantidade</th>
                <th>Preço de Venda</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-stock">
        </tbody>
    </table>
    <div style="background: white; padding: 20px; margin-top: 20px; border: 1px solid #ddd;">
        <h3>➕ Adicionar Nova Peça</h3>
        <form id="form-stock" onsubmit="adicionarPeca(event)">
            <input type="text" id="nome" placeholder="Nome da Peça" required>
            <input type="number" id="quantidade" placeholder="Quantidade" required>
            <input type="number" step="0.01" id="preco" placeholder="Preço de Venda (€)" required>
            <button type="submit"
                style="background: #28a745; color: white; padding: 10px; border: none; cursor: pointer;">Guardar
                Peça</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
